version: '3.9'
services:
  mysql:
    image: mysql:8.4
    container_name: maria-paparico-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: maria_paparico
      MYSQL_USER: root
      MYSQL_PASSWORD: 123456
    ports:
      - '3306:3306'
    command: --default-authentication-plugin=caching_sha2_password
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
